<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
<div class="card p-4">

<h3 class="text-center mb-3">Register</h3>

<form action="index.html">

<input class="form-control mb-2" placeholder="Name" required>
<input class="form-control mb-2" placeholder="Email" required>
<input class="form-control mb-2" placeholder="Phone" required>

<input type="password" class="form-control mb-2" placeholder="Password" required>
<input type="password" class="form-control mb-2" placeholder="Confirm Password" required>

<button class="btn btn-success w-100 mt-2">Register</button>

<div class="text-center mt-3">
<a href="index.html">Already have account?</a>
</div>

</form>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
