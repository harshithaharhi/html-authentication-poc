<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="card">

<h3 class="text-center mb-4">Create Account</h3>

<form action="index.html">

<input type="text" class="form-control mb-3" placeholder="Full Name" required>

<input type="email" class="form-control mb-3" placeholder="Email" required>

<input type="tel" class="form-control mb-3" placeholder="Phone" required pattern="[0-9]{10}" title="Enter 10 digit phone number">

<input type="password" class="form-control mb-3" placeholder="Password" required minlength="6">

<input type="password" class="form-control mb-3" placeholder="Confirm Password" required>

<button type="submit" class="btn btn-primary w-100">Register</button>

<div class="text-center mt-3">
<a href="index.html">Already have an account?</a>
</div>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
